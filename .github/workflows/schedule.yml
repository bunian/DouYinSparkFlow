name: DouYin Spark Flow Schedule Run
on:
  workflow_dispatch:
  schedule:
    - cron: "25 19 * * *"
jobs:
  run-main:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: user-data
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Test Douyin Accessibility
      run: |
        curl -I https://creator.douyin.com/
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Ensure browsers are installed
      run: playwright install chromium --with-deps --only-shell
    - name: Export Github Environment Variables and Secrets to JSON
      env:
        VARS_JSON: ${{ toJson(vars) }}
        SECRETS_JSON: ${{ toJson(secrets) }}
      run: python utils/export_github_env.py
    - name: Run DouYin Spark Flow
      run: python main.py
    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: run-logs
        path: logs/
  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
